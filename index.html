<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词植物意象交互图谱</title>
    <style>
        /* ================= 基础样式设计 ================= */
        :root {
            --bg-color: #f7f5f0;
            --ink-color: #2c2c2c;
            --accent-color: #8a3b3b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "KaiTi", "STKaiti", "Georgia", serif;
            background-color: var(--bg-color);
            color: var(--ink-color);
            /* 修复1：删除了 height: 100vh 和 overflow: hidden，改为最小高度 */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; 
        }

        header {
            text-align: center;
            padding: 80px 20px 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-group {
            position: relative;
            display: inline-block;
            text-align: right;
        }

        /* 恢复你原本的超大字号和间距 */
        h1 {
            margin: 0;
            font-weight: normal;
            letter-spacing: 40px;
            font-size: 8rem;
            color: #4a3b3b;
            font-family: 'STXingkai', 'FZShuTi', 'KaiTi', serif;
            text-shadow: 2px 4px 8px rgba(74, 59, 59, 0.2);
            animation: fadeInDown 1.2s ease-out;
            margin-right: -40px;
            padding-bottom: 10px;
        }

        p.subtitle {
            color: #8a3b3b;
            font-size: 2.2rem;
            margin-top: 5px;
            letter-spacing: 6px;
            font-family: 'KaiTi', serif;
            display: block;
            text-align: right;
            opacity: 0;
            animation: fadeIn 1.5s ease-in 0.8s forwards;
            padding-right: 0;
            margin-right: -6px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.9; }
        }

        /* ================= 主布局 ================= */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 100px;
            flex: 1;
            /* 修复2：允许内容折行，防止小屏幕挤压 */
            flex-wrap: wrap; 
            padding: 20px 0;
        }

        .plant-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .plant-item:hover {
            transform: translateY(-15px);
        }

        /* 恢复你原本的 320px 大圆圈 */
        .plant-btn {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 4px solid #d1d1d1;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .plant-item:hover .plant-btn {
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(138, 59, 59, 0.4);
        }

        .bide-btn-container {
            text-align: center;
            margin-top: 5vh;
            margin-bottom: 2vh;
            z-index: 10;
        }

        .bide-btn {
            display: inline-block;
            padding: 12px 36px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            border-radius: 40px;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(138, 59, 59, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bide-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .bide-btn:hover {
            background-color: #6b2c2c;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(138, 59, 59, 0.5);
            color: #fff;
        }

        .bide-btn:hover::before {
            left: 100%;
        }

        .plant-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .plant-name {
            margin-top: 25px;
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        .plant-item:hover .plant-name {
            color: var(--accent-color);
        }

        .interaction-hint {
            text-align: center;
            font-size: 1.1rem;
            color: #999;
            letter-spacing: 4px;
            margin-bottom: 50px;
        }

        /* ================= 手机端终极适配 ================= */
        @media (max-width: 768px) {
            /* 修复3：手机端强制变回最普通的块级布局，彻底打破 flex 带来的高度锁死 */
            body { display: block; }
            
            h1 {
                font-size: 3.5rem;
                letter-spacing: 15px;
                margin-right: -15px;
            }
            p.subtitle {
                font-size: 1.2rem;
                letter-spacing: 3px;
                margin-top: 0;
            }
            header {
                padding: 40px 10px 10px;
            }
            
            /* 容器变为 block，植物按顺序往下排 */
            .container {
                display: block;
                padding-top: 20px;
                padding-bottom: 20px;
            }
            .plant-item {
                margin: 40px auto; /* 保证上下间距 */
            }
            
            /* 恢复你原本手机端 200px 的设定 */
            .plant-btn {
                width: 200px;
                height: 200px;
            }
            .plant-name {
                font-size: 1.6rem;
                margin-top: 10px;
            }
            .bide-btn {
                font-size: 1.1rem;
                padding: 10px 25px;
            }
            /* 修复4：底部增加安全留白，确保滑到底能完全露出提示语 */
            .interaction-hint {
                padding-bottom: 60px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="title-group">
            <h1>草木有本心</h1>
            <p class="subtitle">——诗词中的植物人格图谱</p>
        </div>
    </header>

    <div class="container">
        <div class="plant-item" onclick="window.location.href='graph.html?plant=plum'">
            <div class="plant-btn">
                <img src="花草/Plum-Blossom-national-flower-of-china.jpg" alt="梅">
            </div>
            <div class="plant-name">梅</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=orchid'">
            <div class="plant-btn">
                <img src="花草/a0737aee0dc3b2968dc8e5cd31df5c7a.png" alt="兰">
            </div>
            <div class="plant-name">兰</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=bamboo'">
            <div class="plant-btn">
                <img src="花草/Phyllostachys-vivaxA-rotated.jpg" alt="竹">
            </div>
            <div class="plant-name">竹</div>
        </div>
    </div>

    <div class="bide-btn-container">
        <a href="tradition.html" class="bide-btn">探究比德传统</a>
    </div>

    <div class="interaction-hint">点击上方植物，探索其文学内涵</div>

    <script src="ai_assistant.js"></script>
</body>

</html>
