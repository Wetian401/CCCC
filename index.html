<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词植物意象交互图谱</title>
    <style>
        /* ================= 基础样式设计 ================= */
        :root {
            --bg-color: #f7f5f0;
            --ink-color: #2c2c2c;
            --accent-color: #8a3b3b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "KaiTi", "STKaiti", "Georgia", serif;
            background-color: var(--bg-color);
            color: var(--ink-color);
            /* 终极修复：彻底移除高度和 overflow 限制，唤醒手机原生滚动 */
            width: 100%;
            -webkit-overflow-scrolling: touch; /* 专门针对 iOS/微信 的顺滑滚动指令 */
        }

        header {
            text-align: center;
            padding: 80px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-group {
            position: relative;
            display: inline-block;
            text-align: right;
        }

        h1 {
            margin: 0;
            font-weight: normal;
            letter-spacing: 40px;
            font-size: 8rem; /* 保持你的震撼大字号 */
            color: #4a3b3b;
            font-family: 'STXingkai', 'FZShuTi', 'KaiTi', serif;
            text-shadow: 2px 4px 8px rgba(74, 59, 59, 0.2);
            animation: fadeInDown 1.2s ease-out;
            /* 关键修复：用 padding-left 抵消字间距，不产生负边距超宽截断，网页就不会被锁死了 */
            padding-left: 40px;
            padding-bottom: 10px;
        }

        p.subtitle {
            color: #8a3b3b;
            font-size: 2.2rem;
            margin-top: 5px;
            letter-spacing: 6px;
            font-family: 'KaiTi', serif;
            display: block;
            text-align: right;
            opacity: 0;
            animation: fadeIn 1.5s ease-in 0.8s forwards;
            padding-left: 6px; /* 替代负边距 */
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.9; }
        }

        /* ================= 主布局 ================= */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* 核心：屏幕不够宽时自动换行，绝不挤压变形 */
            gap: 80px;
            padding: 20px 20px 60px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .plant-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .plant-item:hover {
            transform: translateY(-15px);
        }

        .plant-btn {
            width: 320px; /* 保持你的大气圆圈尺寸 */
            height: 320px;
            border-radius: 50%;
            border: 4px solid #d1d1d1;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .plant-item:hover .plant-btn {
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(138, 59, 59, 0.4);
        }

        .plant-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .plant-name {
            margin-top: 25px;
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        .plant-item:hover .plant-name {
            color: var(--accent-color);
        }

        .bide-btn-container {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .bide-btn {
            display: inline-block;
            padding: 12px 36px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            border-radius: 40px;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(138, 59, 59, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bide-btn:hover {
            background-color: #6b2c2c;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(138, 59, 59, 0.5);
            color: #fff;
        }

        .interaction-hint {
            text-align: center;
            font-size: 1.1rem;
            color: #999;
            letter-spacing: 4px;
            padding-bottom: 150px; /* 留足超大底部空间给悬浮球 */
        }

        /* ================= 手机端原汁原味适配 ================= */
        @media (max-width: 768px) {
            header { padding: 40px 10px 10px; }
            h1 {
                font-size: 3.5rem;
                letter-spacing: 15px;
                padding-left: 15px;
            }
            p.subtitle {
                font-size: 1.2rem;
                letter-spacing: 3px;
                padding-left: 3px;
            }
            .container {
                flex-direction: column; /* 手机端垂直排列 */
                gap: 40px;
                padding-top: 20px;
            }
            .plant-btn {
                width: 200px; /* 恢复你手机端设计的尺寸 */
                height: 200px;
            }
            .plant-name {
                font-size: 1.6rem;
                margin-top: 10px;
            }
            .bide-btn {
                font-size: 1.1rem;
                padding: 10px 25px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="title-group">
            <h1>草木有本心</h1>
            <p class="subtitle">——诗词中的植物人格图谱</p>
        </div>
    </header>

    <div class="container">
        <div class="plant-item" onclick="window.location.href='graph.html?plant=plum'">
            <div class="plant-btn">
                <img src="花草/Plum-Blossom-national-flower-of-china.jpg" alt="梅">
            </div>
            <div class="plant-name">梅</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=orchid'">
            <div class="plant-btn">
                <img src="花草/a0737aee0dc3b2968dc8e5cd31df5c7a.png" alt="兰">
            </div>
            <div class="plant-name">兰</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=bamboo'">
            <div class="plant-btn">
                <img src="花草/Phyllostachys-vivaxA-rotated.jpg" alt="竹">
            </div>
            <div class="plant-name">竹</div>
        </div>
    </div>

    <div class="bide-btn-container">
        <a href="tradition.html" class="bide-btn">探究比德传统</a>
    </div>

    <div class="interaction-hint">点击上方植物，探索其文学内涵</div>

    <script src="ai_assistant.js"></script>
</body>

</html>
