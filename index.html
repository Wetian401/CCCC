<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词植物意象交互图谱</title>
    <style>
        /* ================= 基础样式设计 ================= */
        :root {
            --bg-color: #f7f5f0;
            --ink-color: #2c2c2c;
            --accent-color: #8a3b3b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "KaiTi", "STKaiti", "Georgia", serif;
            background-color: var(--bg-color);
            color: var(--ink-color);
            /* 彻底移除 height: 100vh 和 overflow: hidden */
            /* 彻底移除 body 的 flex 布局，回归最原始的块级自然滚动 */
            min-height: 100vh;
            overflow-x: hidden; /* 仅防止横向溢出 */
        }

        /* 顶部标题栏 */
        header {
            text-align: center;
            padding: 8vh 20px 20px;
            z-index: 10;
        }

        .title-group {
            position: relative;
            display: inline-block;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-weight: normal;
            letter-spacing: 20px;
            font-size: 6rem; /* 稍微缩小一点防止手机端爆屏 */
            color: #4a3b3b;
            font-family: 'STXingkai', 'FZShuTi', 'KaiTi', serif;
            text-shadow: 2px 4px 8px rgba(74, 59, 59, 0.2);
            animation: fadeInDown 1.2s ease-out;
            padding-bottom: 10px;
        }

        p.subtitle {
            color: #8a3b3b;
            font-size: 1.8rem;
            margin-top: 5px;
            letter-spacing: 6px;
            font-family: 'KaiTi', serif;
            opacity: 0;
            animation: fadeIn 1.5s ease-in 0.8s forwards;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.9; }
        }

        /* ================= 主布局 ================= */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* 允许植物图标在小屏幕下自动换行/上下排列 */
            gap: 6vw; /* 间距改为相对单位 */
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .plant-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 20px;
        }

        .plant-item:hover {
            transform: translateY(-15px);
        }

        /* 圆形按钮样式 */
        .plant-btn {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 4px solid #d1d1d1;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            background: #fff;
        }

        .plant-item:hover .plant-btn {
            border-color: var(--accent-color);
            box-shadow: 0 8px 25px rgba(138, 59, 59, 0.4);
        }

        .plant-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .plant-name {
            margin-top: 25px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--ink-color);
            transition: color 0.3s ease;
        }

        .plant-item:hover .plant-name {
            color: var(--accent-color);
        }

        /* 探究比德传统按钮 */
        .bide-btn-container {
            text-align: center;
            margin: 40px 0 20px;
        }

        .bide-btn {
            display: inline-block;
            padding: 12px 36px;
            background-color: var(--accent-color);
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            border-radius: 40px;
            letter-spacing: 2px;
            box-shadow: 0 4px 12px rgba(138, 59, 59, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .bide-btn:hover {
            background-color: #6b2c2c;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(138, 59, 59, 0.5);
            color: #fff;
        }

        /* 底部交互提示语 */
        .interaction-hint {
            text-align: center;
            font-size: 1.1rem;
            color: #999;
            letter-spacing: 4px;
            padding-bottom: 80px; /* 底部留出充足的空白，确保能滑到底 */
        }

        /* ================= 手机端响应式调整 ================= */
        @media (max-width: 768px) {
            header {
                padding: 40px 10px 10px;
            }
            h1 {
                font-size: 3.5rem;
                letter-spacing: 10px;
            }
            p.subtitle {
                font-size: 1.2rem;
                letter-spacing: 3px;
            }
            .container {
                flex-direction: column; /* 手机上强制竖向排列 */
                gap: 30px;
                padding: 20px 10px;
            }
            .plant-btn {
                width: 220px;
                height: 220px;
            }
            .plant-name {
                font-size: 1.6rem;
                margin-top: 15px;
            }
            .bide-btn-container {
                margin: 20px 0;
            }
            .bide-btn {
                font-size: 1.1rem;
                padding: 12px 28px;
            }
            .interaction-hint {
                padding-bottom: 100px; /* 手机端留白更多一点，防遮挡 */
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="title-group">
            <h1>草木有本心</h1>
            <p class="subtitle">——诗词中的植物人格图谱</p>
        </div>
    </header>

    <div class="container">
        <div class="plant-item" onclick="window.location.href='graph.html?plant=plum'">
            <div class="plant-btn">
                <img src="花草/Plum-Blossom-national-flower-of-china.jpg" alt="梅">
            </div>
            <div class="plant-name">梅</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=orchid'">
            <div class="plant-btn">
                <img src="花草/a0737aee0dc3b2968dc8e5cd31df5c7a.png" alt="兰">
            </div>
            <div class="plant-name">兰</div>
        </div>

        <div class="plant-item" onclick="window.location.href='graph.html?plant=bamboo'">
            <div class="plant-btn">
                <img src="花草/Phyllostachys-vivaxA-rotated.jpg" alt="竹">
            </div>
            <div class="plant-name">竹</div>
        </div>
    </div>

    <div class="bide-btn-container">
        <a href="tradition.html" class="bide-btn">探究比德传统</a>
    </div>

    <div class="interaction-hint">点击上方植物，探索其文学内涵</div>

    <script src="ai_assistant.js"></script>
</body>

</html>
